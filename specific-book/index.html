<!DOCTYPE html>
<html lang="uk">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Окрема книга</title>
  </head>
  <body>
    <!-- HEADER -->
    <header>
      <div class="container">
        <hr />
        <h1>JS BAND STORE/Nikitin Ihor</h1>
        <div>
          <img src="./images/cart.svg" alt="cart" width="36" />
          <button value="Sign-Out">Sign-Out</button>
        </div>
        <hr />
      </div>
    </header>
    <!-- HEADER -->

    <!-- MAIN -->
    <main>
      <div class="container">
        <div>
          <img
            src="./images/4045702223_w640_h640_kniga-javascript-dlya.webp"
            alt="Javascript for kids"
            width="240"
          />
          <p><b>Book name:</b> Javascript for kids</p>
          <p><b>Book author:</b> Nick Morgan</p>
          <p><b>Book level:</b> Beginner</p>
          <p><b>Book tags:</b> Vore</p>
        </div>
        <div>
          <p>Price: 5$</p>
          <form action="/" method="POST">
            <input type="number" name="count" />
          </form>
          <p>Total price: 25</p>
          <button value="Add to cart">Add to cart</button>
        </div>
      </div>
      <div>
        <p>
          <b>Description:</b> A book providing an introduction in Javascript language and
          programming in general.
        </p>
      </div>
    </main>
    <!-- MAIN -->
  </body>
</html>
