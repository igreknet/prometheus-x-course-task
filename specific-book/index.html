<!DOCTYPE html>
<html lang="uk">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Окрема книга</title>
    <link rel="stylesheet" href="./styles.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <!-- HEADER -->
    <header class="header">
      <div class="header-row">
        <h1 class="header-title">
          <a href="#">JS BAND STORE</a>
        </h1>
        <ul class="header-menu">
          <li>
            <a href="#"><img src="./images/cart.svg" alt="cart" width="36" /></a>
          </li>
          <li>
            <button value="Sign-Out">Sign-Out</button>
          </li>
          <li class="username-row">
            <div class="user-logo"></div>
            <a href="#">Username</a>
          </li>
        </ul>
      </div>
    </header>
    <!-- HEADER -->

    <!-- MAIN -->
    <main class="main">
      <div class="main-row">
        <div class="book-description">
          <img
            src="./images/4045702223_w640_h640_kniga-javascript-dlya.webp"
            alt="Javascript for kids"
            width="240"
          />
          <p><b>Book name:</b> Javascript for kids</p>
          <p><b>Book author:</b> Nick Morgan</p>
          <p><b>Book level:</b> Beginner</p>
          <p><b>Book tags:</b> Vore</p>
        </div>
        <div class="book-order">
          <p>Price: 5$</p>
          <form action="/" method="POST">
            <label for="count">Count</label>
            <input type="number" name="count" id="count" />
          </form>
          <p>Total price: 25</p>
          <button value="Add to cart">Add to cart</button>
        </div>
      </div>
      <div>
        <p>
          <b>Description:</b> A book providing an introduction in Javascript language and
          programming in general.
        </p>
      </div>
    </main>
    <!-- MAIN -->
  </body>
</html>
